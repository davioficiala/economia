
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 Brain Orçamento</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<script type="module" src="firebase.js"></script>
<script defer src="app.js"></script>

</head>

<body>

<header>

<h1>💰 Brain Orçamento</h1>

</header>

<div class="container">

<div class="card">

<h2>Nova Entrada</h2>

<input
type="number"
id="entrada"
placeholder="Digite o valor da entrada">

<button onclick="salvarFinanceiro()">
Salvar
</button>

</div>

<div class="card">

<h2>Resumo</h2>

<p>🛡️ Reserva de Emergência</p>

<h2 id="emergencia">R$ 0,00</h2>

<p>📈 Investimentos</p>

<h2 id="investimentos">R$ 0,00</h2>

<p>💳 Gastos</p>

<h2 id="gastos">R$ 0,00</h2>

</div>

<div class="card">

<h2>📷 Scanner de Produto</h2>

<button onclick="abrirScanner()">

Abrir Scanner

</button>

<div id="scanner" style="width:100%;height:250px;"></div>

<p>

Código:

<span id="codigoLido">

Nenhum

</span>

</p>

</div>

<div class="card">

<h2>📦 Produto Encontrado</h2>

<p id="produtoNome">

Nenhum produto

</p>

<p id="produtoValor"></p>

<button onclick="comprarProduto()">

Comprar Produto

</button>

</div>

<!-- NOVA LISTA -->

<div class="card">

<h2>🛒 Lista de Compras</h2>

<div id="listaCompras">

Nenhuma compra.

</div>

<hr>

<h3>Total Comprado</h3>

<h2 id="totalCompras">

R$ 0,00

</h2>

</div>

<div class="card">

<h2>📋 Histórico</h2>

<div id="lista"></div>

</div>

</div>

</body>

</html>
